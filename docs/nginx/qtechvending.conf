# ============================================================
# QtechVending — nginx site config (INDEPENDENT of smart-cabinet)
#
# This file lives at: /etc/nginx/conf.d/qtechvending.conf
# It serves BOTH www.qtechvending.com (production) and
# test.qtechvending.com (staging) on the SAME Next.js build,
# reverse-proxied to the independent pm2 process `qtechvending`
# listening on 127.0.0.1:3001.
#
# Certificates (provided manually, no certbot on this host) are placed at:
#   /etc/nginx/ssl/www.qtechvending.com_bundle.pem  + .key
#   /etc/nginx/ssl/test.qtechvending.com_bundle.pem + .key
# ============================================================

# ---------- HTTP → HTTPS redirects ----------
server {
    listen 80;
    server_name www.qtechvending.com test.qtechvending.com;
    return 301 https://$host$request_uri;
}

# ---------- Production: www.qtechvending.com ----------
server {
    listen 443 ssl http2;
    server_name www.qtechvending.com;

    ssl_certificate     /etc/nginx/ssl/www.qtechvending.com_bundle.pem;
    ssl_certificate_key /etc/nginx/ssl/www.qtechvending.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ---------- Staging: test.qtechvending.com ----------
server {
    listen 443 ssl http2;
    server_name test.qtechvending.com;

    ssl_certificate     /etc/nginx/ssl/test.qtechvending.com_bundle.pem;
    ssl_certificate_key /etc/nginx/ssl/test.qtechvending.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
