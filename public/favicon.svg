<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="lg" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00BCD4"/>
      <stop offset="0.5" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="sh" cx="0.34" cy="0.28" r="0.55">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Tech light-blue sphere -->
  <circle cx="16" cy="16" r="14" fill="url(#lg)"/>
  <circle cx="16" cy="16" r="14" fill="none" stroke="#bae6fd" stroke-opacity="0.6" stroke-width="0.8"/>
  <ellipse cx="12" cy="9.5" rx="7" ry="5" fill="url(#sh)"/>

  <!-- White "Q" letter mark (high contrast at small sizes) -->
  <text x="16" y="22" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="800" fill="#ffffff">Q</text>
</svg>
